name: Jira Audit Pipeline

on:
  schedule:
    # Runs at 06:00 GMT+7 (23:00 UTC previous day), Mon-Fri
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          IN_PROGRESS_THRESHOLD_DAYS: ${{ vars.IN_PROGRESS_THRESHOLD_DAYS || '3' }}
          JIRA_TEAM_LABEL: ${{ secrets.JIRA_TEAM_LABEL }}
          JIRA_ACTIVE_SPRINT_ONLY: ${{ vars.JIRA_ACTIVE_SPRINT_ONLY || 'true' }}
        run: python main.py
